<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm parchment background -->
  <rect width="32" height="32" rx="7" fill="#DDD0B3"/>

  <!-- Shadow layer behind card (stack depth) -->
  <rect x="9" y="9" width="16" height="18" rx="2.5" fill="#B09A76" opacity="0.45"
        transform="rotate(4.5 17 18)"/>

  <!-- Main paper card — tilted left like the app's cards -->
  <g transform="rotate(-2.5 16 16)">
    <rect x="7" y="6" width="18" height="21" rx="2.5"
          fill="#F5EDD6" stroke="rgba(28,16,6,0.2)" stroke-width="1.2"/>
    <!-- Tape strip at top -->
    <rect x="11.5" y="4" width="9" height="4" rx="1.5"
          fill="rgba(255,248,200,0.9)" stroke="rgba(28,16,6,0.1)" stroke-width="0.8"/>
  </g>

  <!-- Flame — bold calorie symbol, reads clearly at 16px -->
  <path d="M16,22 C12,20 11,16 14,13 C14,15.5 15.5,15 15.5,13.5 C15.5,11 17,10 17,10 C17,12.5 19,14.5 19,17 C20.5,15 20,12 19,11 C22,13.5 22,18.5 20,21 C19,23 17,24 16,22Z"
        fill="#CC4A18"/>
</svg>
